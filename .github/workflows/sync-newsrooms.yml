# GitHub Actions workflow for sg-gov-newsrooms-zeeker
# NOTE: Disabled by default — builds run via host-side zeeker-build trigger.
# Enable by removing the `if: false` condition and configuring GitHub Secrets.

name: Sync Government Newsrooms

on:
  # schedule:
  #  - cron: "0 3 * * *"  # 03:00 UTC = 11:00 AM SGT
  workflow_dispatch:

jobs:
  sync:
    if: false  # Disabled — using host-side build trigger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build and deploy
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
        run: |
          uv run zeeker build mlaw_news --sync-from-s3 --setup-fts
          uv run zeeker deploy
