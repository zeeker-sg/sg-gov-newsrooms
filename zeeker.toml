[project]
name = "sg-gov-newsrooms"
database = "sg-gov-newsrooms.db"
title = "SG Government Newsrooms"
description = "Non-commercial catalogue of news releases, speeches, parliamentary replies, and announcements drawn from the official newsrooms of eight Singapore Government bodies: the Ministry of Law, the Singapore Judiciary, the Attorney-General's Chambers, the Intellectual Property Office of Singapore, the Competition and Consumer Commission of Singapore, the Accounting and Corporate Regulatory Authority, the Ministry of Manpower, and the Personal Data Protection Commission. One table per agency; each row carries the item's metadata, a project-generated AI summary, and a link back to the original page. Full article text is extracted for indexing and summarisation only; access to it is not provided through this catalogue — read each item at its source_url. Coverage starts at items published on or after 1 January 2026, collected by daily incremental scrapes (new rows only — published items are never re-fetched or updated). Copyright in each item belongs to the Government of Singapore or the respective agency, and all rights are reserved by them; each source site's terms of use govern reuse and are linked in the corresponding table description. This project is independent and is not affiliated with, endorsed by, or published on behalf of, in collaboration with, or in partnership with any of these agencies. Summaries are AI-generated by this project, not by the agencies, and text extraction is automated and may be imperfect — always check the source agency's website (each row's source_url) for the latest and authoritative version."
license = "© Government of Singapore and the respective source agencies (Ministry of Law, Singapore Judiciary, Attorney-General's Chambers, IPOS, CCCS, ACRA, Ministry of Manpower, PDPC). All rights reserved; reuse is governed by each source site's own terms of use, linked in each table's description."
source = "Official newsrooms of eight Singapore Government ministries, organs of state, and statutory boards"

[resource.mlaw_news]
description = "Ministry of Law news: press releases, speeches, parliamentary speeches, replies, ministerial visits, and announcements, from 1 January 2026 onwards. Discovered from the live Atom feed at https://www.mlaw.gov.sg/feed.xml, which carries roughly the 10 most recent posts and also supplies each article's body — full text is extracted from the feed entry itself, not from a detail-page scrape, so coverage depends on frequent polling. Rows are insert-only; extraction is automated and may be imperfect — the page at each row's source_url is authoritative. Source: Ministry of Law newsroom, https://www.mlaw.gov.sg/news/. © Ministry of Law. Terms of use: https://www.mlaw.gov.sg/terms-of-use/."
sort_desc = "published_date"
label_column = "title"
facets = ["category"]
size = 25
fts_fields = ["title", "summary"]

[resource.mlaw_news.columns]
id = "Primary key: first 12 hex characters of the SHA-256 hash of source_url (hashlib.sha256(url).hexdigest()[:12]). Opaque and stable for a given URL; an article republished at a new URL becomes a new row."
title = "Title of the item, taken from the Atom feed entry's <title> element, e.g. 'Written Answer by Minister for Law to PQ on ...'."
published_date = "Publication date in ISO YYYY-MM-DD, parsed from the Atom entry's <published> timestamp. NULL when the feed timestamp is missing or unparseable (such rows are still imported)."
category = "News category, detected from the 'Posted in' /news/<category> link inside the feed entry's HTML and matched against the known set: press-releases, speeches, parliamentary-speeches, announcements, visits, replies. Anything unrecognised becomes 'other'. Heuristic, not an official taxonomy."
source_url = "Absolute URL of the original item on mlaw.gov.sg, from the Atom entry's <link> element. Every row links back to its source."
summary = "AI-generated summary (about 100 words) focused on legal and policy points, produced by this project — not by the Ministry of Law — from the first 4,000 characters of content_text (or just the title when no text was extracted) using an OpenAI-compatible LLM configured via the LLM_BASE_URL/LLM_MODEL environment variables (production currently runs Gemma4 26B on a local Ollama instance). Empty string when no LLM endpoint is configured at build time or the call fails. May contain errors — verify against content_text and the source page."
content_text = "Full article text, extracted from the HTML body embedded in the Atom feed entry (no detail-page fetch): text of paragraph, heading, list-item, and table-cell elements longer than 15 characters, joined with blank lines; navigation chrome and 'Posted in'/'Last updated on' lines are stripped. Heuristic plain-text extraction — formatting and short lines may be lost; the page at source_url is authoritative. Empty string when the feed entry yields no extractable text."
created_at = "ISO 8601 UTC timestamp recording when this row was first scraped. Rows are insert-only (already-imported URLs are skipped on later runs), so this is import time, not publication time."

[resource.judiciary_news]
description = "Singapore Judiciary news: speeches, media releases, media advisories, and announcements across the Supreme Court, State Courts, Family Justice Courts, and related bodies, from 1 January 2026 onwards. Discovered via the newsroom's Sitefinity GetFilteredList endpoint (POST, paginated per year, newest first; pagination stops once a whole page of items is already in the database), with full text scraped from each item's detail page. Rows are insert-only; extraction is automated and may be imperfect — the page at each row's source_url is authoritative. Source: Singapore Judiciary newsroom, https://www.judiciary.gov.sg/news-and-resources/news. © Government of Singapore. Terms of use: https://www.judiciary.gov.sg/terms-of-use."
sort_desc = "published_date"
label_column = "title"
facets = ["content_type", "courts"]
size = 25
fts_fields = ["title", "summary"]

[resource.judiciary_news.columns]
id = "Primary key: first 12 hex characters of the SHA-256 hash of source_url (hashlib.sha256(url).hexdigest()[:12]). Opaque and stable for a given URL; an article republished at a new URL becomes a new row."
title = "Title of the item, taken from the <h4> heading of its listing entry (falling back to the link's title attribute), e.g. 'Opening of the Legal Year 2026'."
published_date = "Publication date in ISO YYYY-MM-DD, parsed from the date span in the GetFilteredList listing metadata (printed as e.g. '10 Apr 2026'). NULL when the listing carries no parseable date (such rows are still imported)."
content_type = "Item type exactly as printed in the listing metadata span, e.g. 'Speech', 'Media Release', 'Media Advisory'. Open-ended — values come unvalidated from the listing, so new types appear as the Judiciary uses them. Empty string when no type span is found."
courts = "Pipe-joined court names from the listing entry's court tags, e.g. 'Supreme Court' or 'Supreme Court|State Courts'. Empty string when the listing names no court."
source_url = "Absolute URL of the original item on judiciary.gov.sg, resolved from the listing entry's link. Every row links back to its source."
summary = "AI-generated summary (about 100 words) focused on judicial developments, produced by this project — not by the Singapore Judiciary — from the first 4,000 characters of content_text (or just the title when no text was extracted) using an OpenAI-compatible LLM configured via the LLM_BASE_URL/LLM_MODEL environment variables (production currently runs Gemma4 26B on a local Ollama instance). Empty string when no LLM endpoint is configured at build time or the call fails. May contain errors — verify against content_text and the source page."
content_text = "Full article text scraped from the detail page's '.detail-wrapper .col-md-8' container (falling back to '.sf_colsIn.primary-content', then the main content area): text of paragraph, heading, list-item, and table-cell elements longer than 10 characters, joined with blank lines. Heuristic plain-text extraction — the page at source_url is authoritative. Empty string when the detail-page fetch or extraction fails (the row is still imported)."
created_at = "ISO 8601 UTC timestamp recording when this row was first scraped. Rows are insert-only (already-imported URLs are skipped on later runs), so this is import time, not publication time."

[resource.agc_news]
description = "Attorney-General's Chambers newsroom: press releases, media statements, speeches, appointment announcements, and prosecution updates, from 1 January 2026 onwards. Discovered from the live sitemap at https://www.agc.gov.sg/sitemap.xml filtered to /newsroom/ URLs; publication dates prefer the newsroom listing page's Isomer RSC payload, falling back to a scrape of the article page that may yield a last-updated date instead; full text comes from each page's main element. Rows are insert-only; extraction is automated and may be imperfect — the page at each row's source_url is authoritative. Source: AGC newsroom, https://www.agc.gov.sg/newsroom/. © Attorney-General's Chambers. Terms of use: https://www.agc.gov.sg/terms-of-use."
sort_desc = "published_date"
label_column = "title"
facets = ["category"]
size = 25
fts_fields = ["title", "summary"]

[resource.agc_news.columns]
id = "Primary key: first 12 hex characters of the SHA-256 hash of source_url (hashlib.sha256(url).hexdigest()[:12]). Opaque and stable for a given URL; an article republished at a new URL becomes a new row."
title = "Title of the item, taken from the article page's <h1> (falling back to the <title> tag, text before any '|'), e.g. 'Opening of the Legal Year 2026 — Speech by the Attorney-General'."
published_date = "Date in ISO YYYY-MM-DD. Prefers the publication date carried in the newsroom listing page's Isomer RSC payload; when absent, falls back to scraping the article page — first the 'last updated DD Month YYYY' footer, then the first day-month-year pattern anywhere in the page text — so fallback values can be a last-modified date rather than the original publication date. NULL when no date is found at all (the row is still imported)."
category = "Content type inferred heuristically from keywords in the URL slug and title: press-release, media-statement, speech, appointment, prosecution, or other (default). Not an official AGC taxonomy — treat as approximate."
source_url = "Absolute URL of the original item on agc.gov.sg, taken from a /newsroom/ entry in the site's sitemap.xml. Every row links back to its source."
summary = "AI-generated summary (about 100 words) focused on legal and institutional developments, produced by this project — not by AGC — from the first 4,000 characters of content_text (or just the title when no text was extracted) using an OpenAI-compatible LLM configured via the LLM_BASE_URL/LLM_MODEL environment variables (production currently runs Gemma4 26B on a local Ollama instance). Empty string when no LLM endpoint is configured at build time or the call fails. May contain errors — verify against content_text and the source page."
content_text = "Full article text scraped from the page's <main> element (falling back to <body>), with navigation, header, footer, and form elements stripped: text of paragraph, heading, list-item, and table-cell elements longer than 15 characters, joined with blank lines. Heuristic plain-text extraction — the page at source_url is authoritative. Empty string when extraction yields nothing."
created_at = "ISO 8601 UTC timestamp recording when this row was first scraped. Rows are insert-only (already-imported URLs are skipped on later runs), so this is import time, not publication time."

