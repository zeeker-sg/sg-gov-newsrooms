sort_desc = "published_date"
label_column = "title"
facets = ["category"]
size = 25
fts_fields = ["title", "summary"]

[resource.ipos_news.columns]
id = "Primary key: first 12 hex characters of the SHA-256 hash of source_url (hashlib.sha256(url).hexdigest()[:12]). Opaque and stable for a given URL; an article republished at a new URL becomes a new row."
title = "Title of the item, taken from the article page's <h1> (falling back to the <title> tag, then the listing payload's title), e.g. 'Singapore Ranked Among Top IP Offices'."
published_date = "Date in ISO YYYY-MM-DD. Prefers the publication date carried in the listing page's Isomer RSC payload; when absent, falls back to scraping the article page — first the 'last updated DD Month YYYY' footer, then the first day-month-year pattern in the page text — so fallback values can be a last-modified date rather than the original publication date. NULL when no date is found at all (the row is still imported)."
category = "Content type, mapped from the listing payload's category label where recognised (media-release, speech, insights, update), otherwise inferred from keywords in the URL slug and title, defaulting to 'other'. Heuristic, not an official IPOS taxonomy."
source_url = "Absolute URL of the original item on ipos.gov.sg, built from the article path in the listing page's Isomer RSC payload. Every row links back to its source."
summary = "AI-generated summary (about 100 words) focused on IP and innovation developments, produced by this project — not by IPOS — from the first 4,000 characters of content_text (or just the title when no text was extracted) using an OpenAI-compatible LLM configured via the LLM_BASE_URL/LLM_MODEL environment variables (production currently runs Gemma4 26B on a local Ollama instance). Empty string when no LLM endpoint is configured at build time or the call fails. May contain errors — verify against content_text and the source page."
content_text = "Full article text scraped from the page's <main id=\"main-content\"> element (falling back to any <main>, then <body>), with navigation, header, footer, and form elements stripped: text of paragraph, heading, list-item, and table-cell elements longer than 15 characters, joined with blank lines. Heuristic plain-text extraction — the page at source_url is authoritative. Empty string when extraction yields nothing."
created_at = "ISO 8601 UTC timestamp recording when this row was first scraped. Rows are insert-only (already-imported URLs are skipped on later runs), so this is import time, not publication time."

