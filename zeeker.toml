[resource.mom_news]
description = "Ministry of Manpower press releases — workplace safety, employment standards, foreign workforce, and labour-market statistics — from 1 January 2026 onwards. Discovered from the dedicated newsroom sitemap at https://www.mom.gov.sg/newsroom.xml, pre-filtered to detail URLs matching /newsroom/press-releases/YYYY/MMDD-slug (the year in the URL gates the 2026 cutoff before any page is fetched); full text scraped from each press release page. Rows are insert-only; extraction is automated and may be imperfect — the page at each row's source_url is authoritative. Source: MOM press releases, https://www.mom.gov.sg/newsroom/press-releases. © Government of Singapore. Terms of use: https://www.mom.gov.sg/terms-of-use."
sort_desc = "published_date"
label_column = "title"
facets = ["category"]
size = 25
fts_fields = ["title", "summary"]

[resource.mom_news.columns]
id = "Primary key: first 12 hex characters of the SHA-256 hash of source_url (hashlib.sha256(url).hexdigest()[:12]). Opaque and stable for a given URL; an article republished at a new URL becomes a new row."
title = "Title of the press release, taken from the page's <h1> (falling back to the <title> tag, text before any '|' or '-'), e.g. '10 Arrested for Suspected Work Pass Offences'."
published_date = "Date in ISO YYYY-MM-DD, parsed from the URL pattern /newsroom/press-releases/YYYY/MMDD-slug (e.g. .../2026/0401-... becomes 2026-04-01); falls back to the first day-month-year pattern in the page text. NULL when neither yields a date (the row is still imported)."
category = "Topic area inferred heuristically from keywords in the URL slug and title: workplace-safety, foreign-workforce, statistics, employment-standards, or general (the default). Not an official MOM taxonomy — treat as approximate."
source_url = "Absolute URL of the original press release on mom.gov.sg, taken from the newsroom.xml sitemap. Every row links back to its source."
summary = "AI-generated summary (about 100 words) focused on workforce and employment developments, produced by this project — not by MOM — from the first 4,000 characters of content_text (or just the title when no text was extracted) using an OpenAI-compatible LLM configured via the LLM_BASE_URL/LLM_MODEL environment variables (production currently runs Gemma4 26B on a local Ollama instance). Empty string when no LLM endpoint is configured at build time or the call fails. May contain errors — verify against content_text and the source page."
content_text = "Full press-release text scraped by trying <article>, <main>, content-class containers, then <body> in order (first selector yielding more than 100 characters wins), with navigation, header, footer, and form elements stripped: text of paragraph, heading, list-item, and table-cell elements longer than 15 characters, joined with blank lines. Heuristic plain-text extraction — the page at source_url is authoritative. Empty string when extraction yields nothing."
created_at = "ISO 8601 UTC timestamp recording when this row was first scraped. Rows are insert-only (already-imported URLs are skipped on later runs), so this is import time, not publication time."

[resource.pdpc_news]
description = "Personal Data Protection Commission (PDPC) press room: media releases, speeches, forum replies, clarifications, and other items, from 1 January 2026 onwards. Discovered via the press room's JSON listing API (a POST endpoint authenticated with a verification token read from the press room page), paginated per year; titles, dates, and types come from the API, and full text is scraped from each detail page, with the API's short description used as a fallback when the detail fetch fails. Rows are insert-only; extraction is automated and may be imperfect — the page at each row's source_url is authoritative. Source: PDPC press room, https://www.pdpc.gov.sg/news-and-events/press-room. © Personal Data Protection Commission. PDPC's website Terms and Conditions of Use (https://www.pdpc.gov.sg/terms-and-conditions) grant a conditional licence to use, copy, and distribute site contents for non-commercial, informational and similar purposes only; this table is reproduced and shared on that non-commercial, informational basis, and any reuse remains subject to those terms."
sort_desc = "published_date"
label_column = "title"
facets = ["category"]
size = 25
fts_fields = ["title", "summary"]

[resource.pdpc_news.columns]
id = "Primary key: first 12 hex characters of the SHA-256 hash of source_url (hashlib.sha256(url).hexdigest()[:12]). Opaque and stable for a given URL; an article republished at a new URL becomes a new row."
title = "Title of the item, passed through verbatim from the press-room API's title field, e.g. 'PDPC Takes Enforcement Action Against ...'."
published_date = "Publication date in ISO YYYY-MM-DD, parsed from the press-room API's date field (printed as e.g. '10 Apr 2026'). NULL when the API value is missing or unparseable (such rows are still imported)."
category = "Slugified passthrough of the press-room API's type field (e.g. 'Media Release' becomes 'media-release'); 'other' when the API response carries no type field (a blank type slugifies to an empty string). Open set — values observed so far include media-release, speech, forum-reply, article-clarification, and advertorial, but new upstream types will appear unannounced. This is PDPC's own labelling, slugified, not a curated taxonomy."
source_url = "Absolute URL of the original item on pdpc.gov.sg, built from the relative path in the press-room API response. Every row links back to its source."
summary = "AI-generated summary (about 100 words) focused on data protection and PDPA developments, produced by this project — not by PDPC — from the first 4,000 characters of content_text (or just the title when no text was extracted) using an OpenAI-compatible LLM configured via the LLM_BASE_URL/LLM_MODEL environment variables (production currently runs Gemma4 26B on a local Ollama instance). Empty string when no LLM endpoint is configured at build time or the call fails. May contain errors — verify against content_text and the source page."
content_text = "Full article text scraped from the detail page's #mainContent container (falling back to <main>, then <body>), with navigation, header, footer, and form elements stripped: text of paragraph, heading, list-item, and table-cell elements longer than 15 characters, joined with blank lines. When the detail-page fetch fails, this falls back to the press-room API's short description field, so some rows hold only a one-line teaser. Heuristic plain-text extraction — the page at source_url is authoritative."
created_at = "ISO 8601 UTC timestamp recording when this row was first scraped. Rows are insert-only (already-imported URLs are skipped on later runs), so this is import time, not publication time."
